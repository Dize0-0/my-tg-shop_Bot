<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Магазин плагинов</title>
    <style>
        body { font-family: Arial, sans-serif; background: #222; color: #fff; }
        .container { max-width: 500px; margin: 40px auto; background: #333; padding: 24px; border-radius: 12px; }
        h1 { text-align: center; }
        .product { margin: 16px 0; padding: 12px; background: #444; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        button { background: #4caf50; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        button:hover { background: #388e3c; }
    </style>
</head>
<body>
<div class="container">
    <h1>Магазин плагинов</h1>
    {% for product in products %}
    <div class="product">
        <span>{{ product.name }} — {{ product.price }}₽</span>
        <button onclick="buyProduct({{ product.id }})">Купить</button>
    </div>
    {% endfor %}
</div>
<script>
function buyProduct(productId) {
    fetch('/buy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ product_id: productId })
    })
    .then(res => res.json())
    .then(data => {
        if (data.status === 'ok') {
            alert('Покупка оформлена!');
        } else {
            alert('Ошибка покупки');
        }
    });
}
</script>
</body>
</html>
