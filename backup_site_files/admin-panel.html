<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — Telegram Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #1a1a1a;
      --bg-panel: #23272f;
      --bg-card: #23272f;
      --bg-header: #1e1e1e;
      --text-main: #e0e0e0;
      --text-muted: #b0b0b0;
      --accent: #4a90e2;
      --accent2: #1abc9c;
      --radius: 6px;
      --shadow: 0 4px 24px rgba(0,0,0,0.18);
      --sidebar-width: 220px;
      --header-height: 64px;
      --transition: 0.18s cubic-bezier(.4,0,.2,1);
    }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: var(--bg-main);
      color: var(--text-main);
      font-family: 'Inter', 'Roboto', sans-serif;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .layout {
      display: flex;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }
    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-panel);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      box-shadow: 2px 0 16px #00000022;
      z-index: 10;
      position: relative;
    }
    .sidebar-logo {
      height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
      border-bottom: 1px solid #222;
      user-select: none;
    }
    .sidebar-menu {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-top: 18px;
    }
    .sidebar-menu-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 24px;
      font-size: 1rem;
      color: var(--text-main);
      background: none;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      outline: none;
      position: relative;
    }
    .sidebar-menu-btn[aria-current="page"], .sidebar-menu-btn.active {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }
    .sidebar-menu-btn:hover:not([aria-current="page"]) {
      background: #222b;
      color: var(--accent);
    }
    .sidebar-menu-btn .icon {
      font-size: 1.3em;
      width: 1.7em;
      text-align: center;
      display: inline-block;
    }
    .sidebar-bottom {
      padding: 18px 0 12px 0;
      border-top: 1px solid #222;
      text-align: center;
      font-size: 0.95em;
      color: var(--text-muted);
    }
    /* Header */
    .header {
      position: fixed;
      left: var(--sidebar-width);
      right: 0;
      top: 0;
      height: var(--header-height);
      background: var(--bg-header);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      box-shadow: 0 2px 12px #00000022;
      z-index: 9;
    }
    .header-title {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .header-admin {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .header-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2em;
      color: #fff;
      font-weight: 700;
      box-shadow: 0 2px 8px #00000022;
    }
    /* Main content */
    .main {
      flex: 1;
      margin-left: var(--sidebar-width);
      margin-top: var(--header-height);
      background: var(--bg-main);
      min-height: calc(100vh - var(--header-height));
      padding: 32px 36px 36px 36px;
      overflow-y: auto;
      transition: background var(--transition);
    }
    /* Cards, tables, forms, etc. */
    .card {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 28px;
      margin-bottom: 24px;
      transition: box-shadow var(--transition);
    }
    .card:hover {
      box-shadow: 0 8px 32px #4a90e233;
    }
    .metrics {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .metric-card {
      flex: 1 1 180px;
      min-width: 160px;
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 22px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      transition: box-shadow var(--transition);
    }
    .metric-title {
      font-size: 0.98em;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    .metric-value {
      font-size: 2.1em;
      font-weight: 700;
      color: var(--accent);
    }
    /* Dashboard chart */
    .chart-block {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 22px 10px 22px;
      margin-bottom: 24px;
      min-height: 220px;
    }
    .chart-title {
      font-size: 1.1em;
      font-weight: 600;
      margin-bottom: 10px;
    }
    /* Users table */
    .table-block {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 22px;
      margin-bottom: 24px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      color: var(--text-main);
      font-size: 1em;
    }
    th, td {
      padding: 10px 12px;
      text-align: left;
    }
    th {
      color: var(--accent);
      font-weight: 600;
      border-bottom: 1px solid #333;
      background: #23272f;
    }
    tr {
      transition: background var(--transition);
    }
    tr:hover {
      background: #23272f99;
    }
    .table-actions {
      display: flex;
      gap: 8px;
    }
    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 8px 18px;
      font-size: 0.97rem;
      font-weight: 600;
      box-shadow: none;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      outline: none;
    }
    .btn:hover, .btn:active {
      background: var(--accent2);
      color: #fff;
    }
    .btn-secondary {
      background: #23272f;
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    .btn-secondary:hover {
      background: var(--accent);
      color: #fff;
    }
    .input, select {
      background: #23272f;
      color: var(--text-main);
      border: 1px solid #333;
      border-radius: var(--radius);
      padding: 8px 12px;
      font-size: 1em;
      margin-right: 8px;
      outline: none;
      transition: border var(--transition);
    }
    .input:focus, select:focus {
      border: 1.5px solid var(--accent);
    }
    .search-block {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    /* Broadcasts */
    .broadcast-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 520px;
    }
    .checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1em;
      color: var(--text-main);
      margin-bottom: 4px;
    }
    /* Logs */
    .logs-block {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 22px;
      margin-bottom: 24px;
      min-height: 180px;
      max-height: 320px;
      overflow-y: auto;
      font-family: 'Roboto Mono', 'Consolas', monospace;
      font-size: 0.98em;
      line-height: 1.5;
      color: #b0b0b0;
    }
    .log-info { color: #4a90e2; }
    .log-warning { color: #e2c04a; }
    .log-error { color: #e24a4a; }
    /* Statistics */
    .stats-charts {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }
    .stats-chart {
      flex: 1 1 320px;
      min-width: 260px;
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 22px;
      margin-bottom: 24px;
    }
    /* Spinner */
    .spinner {
      border: 4px solid #23272f;
      border-top: 4px solid var(--accent);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
      display: none;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    /* Toast */
    .toast {
      position: fixed;
      right: 32px;
      bottom: 32px;
      background: #23272f;
      color: #fff;
      padding: 16px 28px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      font-size: 1.05em;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 1000;
    }
    .toast.show {
      opacity: 1;
      pointer-events: auto;
    }
    /* Responsive */
    @media (max-width: 900px) {
      .main { padding: 18px 6px; }
      .metrics { flex-direction: column; gap: 0; }
      .card { margin-bottom: 24px; }
      .sidebar { width: 64px; }
      .sidebar-logo { font-size: 1.1rem; }
      .sidebar-menu-btn span:not(.icon) { display: none; }
      .header { left: 64px; padding: 0 12px; }
    }
    @media (max-width: 600px) {
      .header { left: 0; }
      .sidebar { display: none; }
      .main { margin-left: 0; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <nav class="sidebar" aria-label="Main menu">
      <div class="sidebar-logo" aria-label="Logo">TG_ADMIN</div>
      <div class="sidebar-menu">
        <button class="sidebar-menu-btn active" data-page="dashboard" aria-current="page"><span class="icon" aria-label="Dashboard">🏠</span> <span>Дашборд</span></button>
        <button class="sidebar-menu-btn" data-page="users"><span class="icon" aria-label="Users">👥</span> <span>Пользователи</span></button>
        <button class="sidebar-menu-btn" data-page="broadcasts"><span class="icon" aria-label="Broadcasts">📢</span> <span>Рассылки</span></button>
        <button class="sidebar-menu-btn" data-page="settings"><span class="icon" aria-label="Bot Settings">⚙️</span> <span>Настройки</span></button>
        <button class="sidebar-menu-btn" data-page="logs"><span class="icon" aria-label="Logs">📄</span> <span>Логи</span></button>
        <button class="sidebar-menu-btn" data-page="statistics"><span class="icon" aria-label="Statistics">📊</span> <span>Статистика</span></button>
      </div>
      <div class="sidebar-bottom">&copy; 2026</div>
    </nav>
    <div class="main">
      <header class="header">
        <div class="header-title" id="header-title">Дашборд</div>
        <div class="header-admin">
          <div class="header-avatar" aria-label="Admin avatar">A</div>
          <span>Admin</span>
        </div>
      </header>
      <main id="page-content" tabindex="-1" aria-live="polite">
        <!-- Content will be injected here -->
      </main>
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <div class="spinner" id="spinner"></div>
  <script>
    // --- SPA navigation ---
    const pages = {
      dashboard: renderDashboard,
      users: renderUsers,
      broadcasts: renderBroadcasts,
      settings: renderSettings,
      logs: renderLogs,
      statistics: renderStatistics
    };
    const pageContent = document.getElementById('page-content');
    const headerTitle = document.getElementById('header-title');
    const toast = document.getElementById('toast');
    const spinner = document.getElementById('spinner');
    document.querySelectorAll('.sidebar-menu-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.sidebar-menu-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        const page = this.getAttribute('data-page');
        headerTitle.textContent = this.textContent.trim();
        showPage(page);
      });
    });
    function showPage(page) {
      pageContent.innerHTML = '';
      if (pages[page]) pages[page]();
    }
    // --- Dashboard ---
    function renderDashboard() {
      pageContent.innerHTML = `
        <section>
          <div class="metrics">
            <div class="metric-card"><div class="metric-title">Всего пользователей</div><div class="metric-value" id="metric-users">1 234</div></div>
            <div class="metric-card"><div class="metric-title">Новых за сутки</div><div class="metric-value" id="metric-new">56</div></div>
            <div class="metric-card"><div class="metric-title">Активных за 24ч</div><div class="metric-value" id="metric-active">312</div></div>
            <div class="metric-card"><div class="metric-title">Отправлено сообщений</div><div class="metric-value" id="metric-msgs">8 765</div></div>
          </div>
          <div class="chart-block">
            <div class="chart-title">График активности (7 дней)</div>
            <canvas id="dashboard-activity" height="120"></canvas>
          </div>
        </section>
      `;
      renderLineChart('dashboard-activity', [120, 98, 150, 80, 110, 130, 170]);
    }
    // --- Users ---
    function renderUsers() {
      pageContent.innerHTML = `
        <section>
          <div class="search-block">
            <input class="input" id="user-search" type="text" placeholder="Поиск по имени или username">
            <select id="user-status-filter" class="input">
              <option value="all">Все</option>
              <option value="active">Активные</option>
              <option value="blocked">Заблокированные</option>
            </select>
          </div>
          <div class="table-block">
            <table>
              <thead>
                <tr><th>ID</th><th>Имя</th><th>Username</th><th>Дата подписки</th><th>Статус</th><th>Действия</th></tr>
              </thead>
              <tbody id="users-table-body"></tbody>
            </table>
          </div>
        </section>
      `;
      // Demo data
      const users = [
        {id: 1, name: 'Иван', username: 'ivan123', date: '2026-03-01', status: 'active'},
        {id: 2, name: 'Мария', username: 'maria', date: '2026-02-28', status: 'blocked'},
        {id: 3, name: 'Петр', username: 'peter', date: '2026-02-27', status: 'active'},
        {id: 4, name: 'Анна', username: 'anna', date: '2026-02-25', status: 'active'},
      ];
      function renderTable(filter = '', status = 'all') {
        const tbody = document.getElementById('users-table-body');
        tbody.innerHTML = '';
        users.filter(u => {
          const match = u.name.toLowerCase().includes(filter) || u.username.toLowerCase().includes(filter);
          const statusMatch = status === 'all' || u.status === status;
          return match && statusMatch;
        }).forEach(u => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${u.id}</td><td>${u.name}</td><td>@${u.username}</td><td>${u.date}</td><td>${u.status === 'active' ? 'Активный' : 'Заблокирован'}</td><td class="table-actions">` +
            (u.status === 'active'
              ? `<button class="btn btn-secondary" onclick="blockUser(${u.id})">Заблокировать</button>`
              : `<button class="btn" onclick="unblockUser(${u.id})">Разблокировать</button>`) +
            `</td>`;
          tbody.appendChild(tr);
        });
      }
      window.blockUser = function(id) {
        showToast('Пользователь заблокирован');
        // In real app: update status
      };
      window.unblockUser = function(id) {
        showToast('Пользователь разблокирован');
        // In real app: update status
      };
      renderTable('', 'all');
      document.getElementById('user-search').addEventListener('input', e => {
        renderTable(e.target.value.toLowerCase(), document.getElementById('user-status-filter').value);
      });
      document.getElementById('user-status-filter').addEventListener('change', e => {
        renderTable(document.getElementById('user-search').value.toLowerCase(), e.target.value);
      });
    }
    // --- Broadcasts ---
    function renderBroadcasts() {
      pageContent.innerHTML = `
        <section>
          <form class="broadcast-form" id="broadcast-form">
            <label>Сообщение (Markdown):
              <textarea class="input" id="broadcast-msg" rows="4" required placeholder="Введите текст сообщения..."></textarea>
            </label>
            <label class="checkbox"><input type="checkbox" id="broadcast-media"> Прикрепить медиа</label>
            <input class="input" id="broadcast-file" type="file" style="display:none;">
            <label class="checkbox"><input type="checkbox" id="broadcast-active"> Отправить только активным пользователям</label>
            <div style="display:flex; gap:12px;">
              <button type="button" class="btn btn-secondary" id="broadcast-preview">Предпросмотр</button>
              <button type="submit" class="btn">Отправить всем</button>
            </div>
          </form>
        </section>
      `;
      document.getElementById('broadcast-media').addEventListener('change', function() {
        document.getElementById('broadcast-file').style.display = this.checked ? 'block' : 'none';
      });
      document.getElementById('broadcast-form').addEventListener('submit', function(e) {
        e.preventDefault();
        showSpinner(true);
        setTimeout(() => {
          showSpinner(false);
          showToast('Рассылка отправлена!');
        }, 1200);
      });
      document.getElementById('broadcast-preview').addEventListener('click', function() {
        showToast('Предпросмотр сообщения');
      });
    }
    // --- Settings ---
    function renderSettings() {
      pageContent.innerHTML = `
        <section>
          <form class="broadcast-form" id="settings-form">
            <label>Описание бота:
              <textarea class="input" id="bot-desc" rows="2" required>Мой Telegram-бот</textarea>
            </label>
            <label>Список команд:
              <input class="input" id="bot-commands" value="/start, /help, /info">
            </label>
            <label>Кнопки главного меню:
              <input class="input" id="bot-menu" value="Главная, Профиль, Помощь">
            </label>
            <button type="submit" class="btn">Сохранить изменения</button>
          </form>
        </section>
      `;
      document.getElementById('settings-form').addEventListener('submit', function(e) {
        e.preventDefault();
        showSpinner(true);
        setTimeout(() => {
          showSpinner(false);
          showToast('Настройки сохранены!');
        }, 1000);
      });
    }
    // --- Logs ---
    function renderLogs() {
      pageContent.innerHTML = `
        <section>
          <div style="display:flex; gap:12px; align-items:center; margin-bottom:10px;">
            <select id="log-level" class="input">
              <option value="all">Все</option>
              <option value="info">Info</option>
              <option value="warning">Warning</option>
              <option value="error">Error</option>
            </select>
            <button class="btn btn-secondary" id="clear-logs">Очистить логи</button>
          </div>
          <div class="logs-block" id="logs-block" aria-label="Логи" tabindex="0"></div>
        </section>
      `;
      let logs = [
        {ts: '2026-03-08 10:00', level: 'info', msg: 'Бот запущен.'},
        {ts: '2026-03-08 10:01', level: 'warning', msg: 'Потеряно соединение с Telegram.'},
        {ts: '2026-03-08 10:02', level: 'error', msg: 'Ошибка отправки сообщения.'},
        {ts: '2026-03-08 10:03', level: 'info', msg: 'Пользователь @ivan123 подписался.'},
      ];
      function renderLogsTable(level = 'all') {
        const block = document.getElementById('logs-block');
        block.innerHTML = '';
        logs.filter(l => level === 'all' || l.level === level).forEach(l => {
          const div = document.createElement('div');
          div.className = 'log-' + l.level;
          div.textContent = `[${l.ts}] ${l.level.toUpperCase()}: ${l.msg}`;
          block.appendChild(div);
        });
      }
      renderLogsTable('all');
      document.getElementById('log-level').addEventListener('change', function() {
        renderLogsTable(this.value);
      });
      document.getElementById('clear-logs').addEventListener('click', function() {
        logs = [];
        renderLogsTable('all');
        showToast('Логи очищены');
      });
    }
    // --- Statistics ---
    function renderStatistics() {
      pageContent.innerHTML = `
        <section>
          <div class="stats-charts">
            <div class="stats-chart">
              <div class="chart-title">Рост пользователей (месяц)</div>
              <canvas id="stats-bar" height="120"></canvas>
            </div>
            <div class="stats-chart">
              <div class="chart-title">Платформы</div>
              <canvas id="stats-pie" height="120"></canvas>
            </div>
          </div>
        </section>
      `;
      renderBarChart('stats-bar', [12, 18, 22, 30, 40, 55, 70, 90, 120, 150, 180, 210]);
      renderPieChart('stats-pie', [60, 30, 10], ['iOS', 'Android', 'Desktop']);
    }
    // --- Chart rendering (vanilla JS, no libs) ---
    function renderLineChart(id, data) {
      const canvas = document.getElementById(id);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const w = canvas.width = canvas.offsetWidth;
      const h = canvas.height = canvas.offsetHeight;
      const max = Math.max(...data);
      const min = Math.min(...data);
      ctx.strokeStyle = '#4a90e2';
      ctx.lineWidth = 2;
      ctx.beginPath();
      data.forEach((v, i) => {
        const x = i * (w / (data.length - 1));
        const y = h - ((v - min) / (max - min + 1e-6)) * (h - 24) - 12;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();
      ctx.fillStyle = '#4a90e2';
      data.forEach((v, i) => {
        const x = i * (w / (data.length - 1));
        const y = h - ((v - min) / (max - min + 1e-6)) * (h - 24) - 12;
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, 2 * Math.PI);
        ctx.fill();
      });
    }
    function renderBarChart(id, data) {
      const canvas = document.getElementById(id);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const w = canvas.width = canvas.offsetWidth;
      const h = canvas.height = canvas.offsetHeight;
      const max = Math.max(...data);
      const barW = w / data.length * 0.7;
      data.forEach((v, i) => {
        const x = i * (w / data.length) + (w / data.length - barW) / 2;
        const y = h - (v / max) * (h - 24) - 12;
        ctx.fillStyle = '#1abc9c';
        ctx.fillRect(x, y, barW, h - y - 12);
      });
    }
    function renderPieChart(id, data, labels) {
      const canvas = document.getElementById(id);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const w = canvas.width = canvas.offsetWidth;
      const h = canvas.height = canvas.offsetHeight;
      const cx = w / 2, cy = h / 2, r = Math.min(w, h) / 2 - 12;
      const total = data.reduce((a, b) => a + b, 0);
      let start = -Math.PI / 2;
      const colors = ['#4a90e2', '#1abc9c', '#e24a4a'];
      data.forEach((v, i) => {
        const angle = (v / total) * 2 * Math.PI;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, start, start + angle);
        ctx.closePath();
        ctx.fillStyle = colors[i % colors.length];
        ctx.fill();
        start += angle;
      });
      // Legend
      ctx.font = '14px Inter, Roboto, sans-serif';
      labels.forEach((label, i) => {
        ctx.fillStyle = colors[i % colors.length];
        ctx.fillRect(10, 10 + i * 22, 16, 16);
        ctx.fillStyle = '#e0e0e0';
        ctx.fillText(label, 32, 24 + i * 22);
      });
    }
    // --- Spinner & Toast ---
    function showSpinner(show) {
      spinner.style.display = show ? 'block' : 'none';
    }
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2200);
    }
    // --- Initial load ---
    showPage('dashboard');
  </script>
